name: Update CfA news feed

on:
  schedule:
    - cron: "17 9 * * *" # daily, 09:17 UTC
  workflow_dispatch: {} # manual run from the Actions tab

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install Pillow

      - name: Scrape cfa.harvard.edu/news
        run: python3 scripts/update_news.py

      - name: Commit and push if the feed changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/news.json assets/images/news
          if git diff --cached --quiet; then
            echo "News feed unchanged."
          else
            git commit -m "Update CfA news feed (automated)"
            git push
            # Bot-token pushes don't always trigger the Pages build; ask explicitly.
            curl -sf -X POST \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/pages/builds" || true
          fi
